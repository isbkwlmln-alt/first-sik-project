<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Diagnostic & Safe Setter Script for window.fetch in iframe environment
      (function() {
        try {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return originalFetch;
            },
            set(newVal) {
              console.warn('Prevented crash: something tried to overwrite window.fetch with:', newVal);
              console.trace(); // Output the stack trace to see what is doing it
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.error('Failed to configure safe window.fetch setter:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
